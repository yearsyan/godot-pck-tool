name: Release

on:
  push:
    tags:
      - "v*"

env:
  APP_NAME: pck-tool

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (tar.gz)
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz ${{ env.APP_NAME }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Install musl-gcc
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (tar.gz)
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz ${{ env.APP_NAME }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (tar.gz)
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz ${{ env.APP_NAME }}.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/*.tar.gz
          generate_release_notes: true
